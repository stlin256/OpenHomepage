# Configuration Example
# Copy this file to config.yaml and modify with your own information

# GitHub username (for fetching public repository info)
github_username: "octocat"

# GitHub Token (required for contribution graph display)
# Generate at GitHub Settings -> Developer settings -> Personal access tokens
# Without token: 60 requests/hour limit, contribution graph will NOT display
# With token: 5000 requests/hour limit, full features available
# github_token: "ghp_xxxxxxxxxxxx"

# Server port
port: 8004

# RSS feed subscriptions (can have multiple)
rss_feeds:
  - url: "https://example.com/blog/feed.xml"
    name: "My Blog"

# Personal bio
bio:
  name: "Your Name"
  title: "Developer & Creator"
  description: "A passionate developer building cool things."
  avatar: "/static/avatar.png"

# Social links
social:
  github: "your-github-username"
  email: "your@email.com"
  twitter: "your-twitter"

# Footer text (optional)
footer:
  text: "Created by Your Name"
