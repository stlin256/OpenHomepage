name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # 每天自动部署
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create config.yaml from secrets
        run: |
          cat > config.yaml << EOF
          github_username: "${{ secrets.GH_USERNAME }}"
          github_token: "${{ secrets.GH_TOKEN }}"
          repo_sort_by: "${{ vars.REPO_SORT_BY }}"
          port: 8004

          rss_feeds:
            - url: "${{ secrets.RSS_URL }}"
              name: "Blog"

          bio:
            name: "${{ secrets.BIO_NAME }}"
            title: "${{ secrets.BIO_TITLE }}"
            description: "${{ secrets.BIO_DESCRIPTION }}"
            avatar: "/static/avatar.png"

          social:
            github: "${{ secrets.GH_USERNAME }}"
            email: "${{ secrets.BIO_EMAIL }}"

          footer:
            text: "${{ secrets.FOOTER_TEXT }}"
          EOF

      - name: Install playwright for static generation
        run: |
          pip install playwright
          playwright install chromium

      - name: Generate static site
        run: python generate.py

      - name: Copy cache to dist
        run: |
          mkdir -p dist/readmes dist/.cache dist/static
          cp -r readmes/* dist/readmes/ 2>/dev/null || true
          cp -r .cache/* dist/.cache/ 2>/dev/null || true
          cp -r static/* dist/static/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          force_orphan: true
